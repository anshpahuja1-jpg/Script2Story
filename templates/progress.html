<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Script2Story — Generating...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        h1 {
            font-size: 20px;
            font-weight: 300;
            letter-spacing: 0.1em;
            margin-bottom: 8px;
        }

        h1 span {
            color: #e50914;
        }

        .status {
            font-size: 14px;
            color: #888;
            margin: 30px 0 16px;
            letter-spacing: 0.05em;
            min-height: 20px;
        }

        .bar-wrap {
            width: 100%;
            height: 2px;
            background: #222;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .bar-fill {
            height: 100%;
            background: #e50914;
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 2px;
        }

        .quote {
            font-size: 13px;
            color: #555;
            font-style: italic;
            line-height: 1.7;
            margin-top: 40px;
            padding: 0 20px;
        }

        .quote-author {
            font-size: 11px;
            color: #444;
            margin-top: 8px;
            letter-spacing: 0.1em;
        }

        .download-btn {
            display: none;
            width: 100%;
            padding: 14px;
            background: #e50914;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 20px;
            text-decoration: none;
        }

        .download-btn:hover {
            background: #b20710;
        }

        .error {
            color: #e50914;
            font-size: 14px;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>SCRIPT<span>2</span>STORY</h1>
        <div class="status" id="status">Starting generation...</div>
        <div class="bar-wrap">
            <div class="bar-fill" id="bar"></div>
        </div>

        <a class="download-btn" id="download-btn" href="/download/{{ job_id }}">Download Storyboard PDF</a>
        <div class="error" id="error">Something went wrong. Please try again.</div>

        <div class="quote" id="quote"></div>
        <div class="quote-author" id="quote-author"></div>
    </div>

    <script>
        const jobId = "{{ job_id }}";
        const quotes = [
            { q: "A film is never really good unless the camera is an eye in the head of a poet.", a: "— Orson Welles" },
            { q: "Cinema is a mirror by which we often see ourselves.", a: "— Martin Scorsese" },
            { q: "Every frame is a painting.", a: "— Stanley Kubrick" },
            { q: "The best camera is the one that captures what you feel.", a: "— Anonymous" },
            { q: "Storyboarding is thinking visually before you can afford to.", a: "— Anonymous" },
        ];

        let qi = 0;
        function showQuote() {
            document.getElementById("quote").textContent = '"' + quotes[qi].q + '"';
            document.getElementById("quote-author").textContent = quotes[qi].a;
            qi = (qi + 1) % quotes.length;
        }
        showQuote();
        setInterval(showQuote, 5000);

        function poll() {
            fetch("/status/" + jobId)
                .then(r => r.json())
                .then(data => {
                    document.getElementById("status").textContent = data.status;
                    document.getElementById("bar").style.width = (data.progress || 0) + "%";

                    if (data.status === "done") {
                        document.getElementById("status").textContent = "Your storyboard is ready!";
                        document.getElementById("bar").style.width = "100%";
                        document.getElementById("download-btn").style.display = "block";
                    } else if (data.status === "error") {
                        document.getElementById("error").style.display = "block";
                        document.getElementById("error").textContent = "Error: " + data.error;
                    } else {
                        setTimeout(poll, 3000);
                    }
                })
                .catch(() => setTimeout(poll, 5000));
        }

        setTimeout(poll, 2000);
    </script>
</body>

</html>
